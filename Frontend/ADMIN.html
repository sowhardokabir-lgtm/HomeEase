<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel – HomeEase</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --sky-bright: #0ea5e9; --navy: #0f172a; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(at 100% 100%, #e0f2fe 0%, #ffffff 100%);
            min-height: 100vh;
        }
        .navbar { background: white; border-bottom: 1px solid #e2e8f0; padding: 1rem 2rem; }
        .card { 
            border: none; 
            border-radius: 20px; 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(10px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-top: 30px;
        }
        .table thead { background: #f8fafc; color: var(--navy); }
        .table { border-radius: 15px; overflow: hidden; }
        .status-badge { padding: 5px 12px; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
        .bg-active { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>
    <nav class="navbar d-flex justify-content-between">
        <span class="fw-800 text-primary fs-4"><i class="bi bi-house-heart-fill"></i> HomeEase</span>
        <button class="btn btn-outline-danger btn-sm rounded-pill px-3">Logout</button>
    </nav>
    <div class="container">
        <div class="card p-4">
            <h4 class="fw-800 mb-4">Manage Users</h4>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>User Name</th>
                            <th>Email Address</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>#1</td>
                            <td class="fw-600">XYZ</td>
                            <td class="text-muted">xyz@gmail.com</td>
                            <td><span class="status-badge bg-active">Active</span></td>
                            <td><button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
