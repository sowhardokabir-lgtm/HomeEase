<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Dashboard – HomeEase</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --sky-bright: #0ea5e9; --navy: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f9ff; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; padding: 25px; background: white; }
        .form-control { border-radius: 10px; margin-bottom: 15px; }
        .primary-btn { background: var(--sky-bright); color: white; border: none; border-radius: 10px; padding: 10px 20px; font-weight: 700; }
        .service-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <h5 class="fw-800 mb-3">Update Profile</h5>
                    <input type="text" class="form-control" placeholder="Your Name">
                    <input type="tel" class="form-control" placeholder="Phone Number">
                    <input type="text" class="form-control" placeholder="Address">
                    <button class="primary-btn w-100">Update Profile</button>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-800 m-0">My Services</h5>
                        <button class="btn btn-sm btn-primary rounded-pill px-3">+ Add New</button>
                    </div>
                    <table class="table align-middle">
                        <thead>
                            <tr><th>Image</th><th>Service</th><th>Price</th><th>Action</th></tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><img src="https://images.unsplash.com/photo-1581092921461-eab62e92c731?auto=format&fit=crop&w=100" class="service-img"></td>
                                <td class="fw-600">AC Repair</td>
                                <td class="text-primary fw-bold">৳1500</td>
                                <td><button class="btn btn-sm text-danger"><i class="bi bi-trash"></i></button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
