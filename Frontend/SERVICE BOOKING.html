<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Service – HomeEase</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --sky-light: #e0f2fe;
            --sky-medium: #bae6fd;
            --sky-bright: #0ea5e9;
            --sky-dark: #0369a1;
            --navy: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(at 0% 0%, hsla(199,89%,82%,1) 0, transparent 50%), 
                        radial-gradient(at 100% 0%, hsla(199,89%,88%,1) 0, transparent 50%), 
                        linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
            min-height: 100vh;
            padding: 40px 0;
        }

        .booking-card {
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            padding: 2.5rem;
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            background: rgba(255, 255, 255, 0.9);
        }

        .btn-brand {
            background: var(--sky-bright);
            color: white;
            font-weight: 700;
            border-radius: 12px;
            padding: 14px;
            border: none;
            transition: 0.3s;
        }

        .btn-brand:hover {
            background: var(--sky-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="text-center mb-4">
                    <h2 class="fw-800 text-navy">Book a Professional Service</h2>
                    <p class="text-muted">Fill in the details below to schedule your help</p>
                </div>
                <div class="card booking-card">
                    <form>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-600">Select Service</label>
                                <select class="form-select">
                                    <option>AC Repair</option>
                                    <option>Plumbing</option>
                                    <option>Cleaning</option>
                                    <option>House Shifting</option>
                                    <option>Pest control</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-600">Contact Number</label>
                                <input type="tel" class="form-control" placeholder="+880...">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-600">Preferred Date</label>
                                <input type="date" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-600">Preferred Time</label>
                                <input type="time" class="form-control">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-600">Service Address</label>
                            <textarea class="form-control" rows="3" placeholder="Enter full home address"></textarea>
                        </div>
                        <button type="submit" class="btn btn-brand w-100">Confirm Booking</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
