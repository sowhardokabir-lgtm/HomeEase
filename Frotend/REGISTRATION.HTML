<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – HomeEase</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --sky-light: #e0f2fe;
            --sky-medium: #bae6fd;
            --sky-bright: #0ea5e9;
            --sky-dark: #0369a1;
            --navy: #0f172a;
            --white: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            /* Stronger Blue Gradient */
            background: 
                radial-gradient(at 0% 0%, hsla(199,89%,82%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(199,89%,88%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(199,89%,92%,1) 0, transparent 50%), 
                radial-gradient(at 0% 100%, hsla(199,89%,85%,1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Decorative Blur Blobs to add "Blue" depth */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: var(--sky-medium);
            filter: blur(100px);
            z-index: -1;
            opacity: 0.5;
        }
        body::before { top: -10%; left: -10%; }
        body::after { bottom: -10%; right: -10%; background: var(--sky-light); }

        .auth-card {
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            padding: 2.5rem;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.8rem;
            color: var(--sky-bright) !important;
            text-decoration: none;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            background: rgba(255, 255, 255, 0.9);
        }

        .btn-sky {
            background: var(--sky-bright);
            color: white;
            font-weight: 700;
            border-radius: 12px;
            padding: 12px;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-sky:hover {
            background: var(--sky-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="text-center mb-4">
                    <a href="Updatehome (1).html" class="navbar-brand">
                        <i class="bi bi-house-heart-fill"></i> HomeEase
                    </a>
                </div>
                <div class="card auth-card">
                    <h3 class="fw-800 text-center mb-2">Create Account</h3>
                    <p class="text-muted text-center mb-4 small">Join the HomeEase community today</p>
                    
                    <form action="register.php" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-600">Full Name</label>
                            <input type="text" name="name" class="form-control" placeholder=>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-600">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder=>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-600">Password</label>
                                <input type="password" name="password" class="form-control" placeholder=>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-600">Confirm Password</label>
                                <input type="password" name="confirm_password" class="form-control" placeholder=>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-sky w-100 mb-3">Register Now</button>
                    </form>
                    <p class="text-center small text-muted mb-0">
                        Already have an account? <a href="login2.html" class="fw-600 text-primary text-decoration-none">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
